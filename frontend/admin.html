<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ — заявления</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-header">
    <h1>🎭 Заявления на поступление</h1>
    <div style="display:flex; gap:10px; align-items:center;">
        <span id="count" style="color:#a08060; font-size:0.83rem;"></span>
        <button class="btn btn-outline" style="padding:7px 16px; font-size:0.83rem;" onclick="loadOrders()">↻ Обновить</button>
        <a href="index.html" class="btn" style="padding:7px 16px; font-size:0.83rem; background:#3d2415; color:#a08060;">← На сайт</a>
    </div>
</div>

<div class="admin-main">

    <div class="filters">
        <span>Фильтр:</span>
        <button class="f-btn on"  onclick="setFilter('all',               this)">Все</button>
        <button class="f-btn"     onclick="setFilter('Новая',             this)">Новые</button>
        <button class="f-btn"     onclick="setFilter('Рассматривается',   this)">Рассматриваются</button>
        <button class="f-btn"     onclick="setFilter('Принята',           this)">Принятые</button>
        <button class="f-btn"     onclick="setFilter('Отклонена',         this)">Отклонённые</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Email</th>
                    <th>Программа</th>
                    <th>Дата</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="ordersGrid">
                <tr><td colspan="8" class="empty">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    const API = 'http://localhost:5002/api/applications';
    let orders = [];
    let currentFilter = 'all';

    async function loadOrders() {
        try {
            const res = await fetch(API);
            orders = await res.json();
            renderOrders(orders);
        } catch (error) {
            document.getElementById('ordersGrid').innerHTML =
                '<tr><td colspan="8" class="empty" style="color:#e08080;">Ошибка загрузки. Запустите: dotnet run</td></tr>';
        }
    }

    function setFilter(val, btn) {
        currentFilter = val;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        const filtered = val === 'all' ? orders : orders.filter(o => o.status === val);
        renderOrders(filtered);
    }

    function getBadgeClass(status) {
        if (status === 'Новая')           return 'new';
        if (status === 'Рассматривается') return 'review';
        if (status === 'Принята')         return 'accepted';
        if (status === 'Отклонена')       return 'rejected';
        return 'new';
    }

    function renderOrders(list) {
        document.getElementById('count').textContent =
            'Показано: ' + list.length + ' из ' + orders.length;

        if (list.length === 0) {
            document.getElementById('ordersGrid').innerHTML =
                '<tr><td colspan="8" class="empty">Заявок нет.</td></tr>';
            return;
        }

        document.getElementById('ordersGrid').innerHTML = list
            .map(o => createRowHTML(o))
            .join('');
    }

    function createRowHTML(o) {
        const date = new Date(o.createdAt).toLocaleDateString('ru-RU');
        return `
            <tr>
                <td style="color:#a08060;">${o.id}</td>
                <td>${o.name}</td>
                <td style="color:#a08060;">${o.phone}</td>
                <td style="color:#a08060;">${o.email || '—'}</td>
                <td>${o.program}</td>
                <td style="color:#a08060;">${date}</td>
                <td><span class="badge ${getBadgeClass(o.status)}">${o.status}</span></td>
                <td><div class="acts">
                        <select onchange="changeStatus(${o.id}, this)">
                            <option value="">Статус ▾</option>
                            <option>Новая</option>
                            <option>Рассматривается</option>
                            <option>Принята</option>
                            <option>Отклонена</option>
                        </select>
                        <button class="del-btn" onclick="removeOrder(${o.id})">✕</button>
                    </div>
                </td>
            </tr>
        `;
    }

    async function changeStatus(id, sel) {
        const status = sel.value;
        if (!status) return;

        await fetch(`${API}/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        });

        const order = orders.find(o => o.id === id);
        if (order) order.status = status;
        sel.value = '';

        const filtered = currentFilter === 'all'
            ? orders
            : orders.filter(o => o.status === currentFilter);
        renderOrders(filtered);
    }

    async function removeOrder(id) {
        if (!confirm('Удалить заявку?')) return;

        await fetch(`${API}/${id}`, { method: 'DELETE' });
        orders = orders.filter(o => o.id !== id);

        const filtered = currentFilter === 'all'
            ? orders
            : orders.filter(o => o.status === currentFilter);
        renderOrders(filtered);
    }

    loadOrders();
</script>

</body>
</html>
